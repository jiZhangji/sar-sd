seed: 42

data:
  manifest: data/weight_download_smoke/manifest.jsonl
  image_size: 64
  batch_size: 1
  num_workers: 0
  sampling_temperature: 1.0

metadata:
  default_gsd: 10.0
  embedding_dim: 64
  dataset_dropout: 0.0
  datasets: [unknown, SAR-1M, SEN1-2, OSDataset, MOS-Ship, QXS-SAROPT, WHU-OPT-SAR, SOMA-1M, 3MOS, SAR2Opt]
  opt_sensors: [unknown, Sentinel-2, Google-Earth, GF-1]
  sar_sensors: [unknown, Sentinel-1, TerraSAR-X, GF-3, PIESAT-1, Capella, ALOS-2, RADARSAT-2, RCM]
  polarizations: [unknown, VV, VH, HH, HV, dual]

model:
  # These are exactly the same pretrained components as formal Stage-1 training.
  vae_path: stabilityai/sd-vae-ft-mse
  unet_path: stable-diffusion-v1-5/stable-diffusion-v1-5
  unet_from_scratch: false
  latent_scale: 0.18215
  condition_dim: 384
  cross_attention_dim: 768
  opt_token_grid: 8
  enable_gradient_checkpointing: true
  freeze_unet: false

diffusion:
  timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012

loss:
  lambda_diffusion: 1.0
  lambda_physical: 0.0
  physical_interval: 0
  adaptive_physical: false
  physical_terms: [mean]

train:
  epochs: 1
  lr: 0.00001
  weight_decay: 0.0
  grad_accum_steps: 1
  grad_clip: 1.0
  mixed_precision: bf16
  output_dir: runs/stage1_weight_download_smoke
  resume_from:
  log_every_steps: 1
  save_every_epochs: 1
  validation_every_epochs: 0
  validation_num_samples: 1
  validation_inference_steps: 2
  max_steps: 1
